# turtlesim_params.yaml - Unified Configuration for OL/CL nodes

# クローズドループ（センサー制御）ノードの設定
closed_loop_drive_node:
  ros__parameters:
    # トピック名
    pose_topic: "/aiformula_sensing/gyro_odometry_publisher/odom"
    cmd_vel_topic: "/aiformula_control/twist_mux/cmd_vel"

    # ゴール判定（許容誤差）
    dist_tolerance: 0.05
    yaw_tolerance: 0.02

    # 速度制限
    max_linear_speed: 2.0
    max_angular_speed: 2.0
    min_linear_speed: 0.1
    min_angular_speed: 0.1

    # P減速のデフォルト設定 (Actionで 0 を指定した時に適用)
    default_use_p_move: false    # 直進時のデフォルト
    default_use_p_rotate: true   # 単純旋回時のデフォルト
    default_use_p_arc: true      # 円弧走行時のデフォルト

    # 制御ゲイン (P制御)
    kp_linear: 2.0     # [move_to / moveの減速用]
    kp_angular: 2.0    # [move_to / rotateの減速用]
    kp_arc: 1.0        # [arcの軌道補正用]

# オープンループ（時間制御）ノードの設定
open_loop_drive_node:
  ros__parameters:
    cmd_vel_topic: "/aiformula_control/twist_mux/cmd_vel"
    linear_speed: 1.0
    angular_speed: 1.0

# クローズドループ（センサー制御）シェイプノードの設定
closed_loop_shape_node:
  ros__parameters:
    # トピック名
    pose_topic: "/aiformula_sensing/gyro_odometry_publisher/odom"
    cmd_vel_topic: "/aiformula_control/twist_mux/cmd_vel"

    # ゴール判定（許容誤差）
    dist_tolerance: 0.05
    yaw_tolerance: 0.02

    # 速度制限
    max_linear_speed: 2.0
    max_angular_speed: 2.0
    min_linear_speed: 0.1
    min_angular_speed: 0.1

    # P減速のデフォルト設定 (Actionで 0 を指定した時に適用)
    default_use_p_move: false    # 直清のデフォルト
    default_use_p_rotate: true   # 単純旋回時のデフォルト
    default_use_p_arc: true      # 円弧走行時のデフォルト

    # 制御ゲイン (P制御)
    kp_linear: 2.0     # [move_to / moveの減速用]
    kp_angular: 2.0    # [move_to / rotateの減速用]
    kp_arc: 1.0        # [arcの軌道補正用]

# オープンループ（時間制御）シェイプノードの設定
open_loop_shape_node:
  ros__parameters:
    cmd_vel_topic: "/aiformula_control/twist_mux/cmd_vel"
    linear_speed: 1.0
    angular_speed: 1.0

