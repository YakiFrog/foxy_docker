# turtlesim_params.yaml - Unified Configuration for OL/CL nodes

# クローズドループ（センサー制御）ノードの設定
closed_loop_drive_node:
  ros__parameters:
    # トピック名
    pose_topic: "/turtle1/pose"
    cmd_vel_topic: "/turtle1/cmd_vel"

    # ゴール判定（許容誤差）
    dist_tolerance: 0.05    # 距離の許容誤差 (m)
    yaw_tolerance: 0.02     # 角度の許容誤差 (rad)

    # 速度制限
    max_linear_speed: 2.0
    min_linear_speed: 0.1
    max_angular_speed: 2.0
    min_angular_speed: 0.1

    # デフォルト速度
    linear_speed: 1.0
    angular_speed: 1.0

    # 制御ゲイン (P制御)
    kp_linear: 2.0
    kp_angular: 4.0
    kp_arc: 1.0

# オープンループ（時間制御）ノードの設定
open_loop_drive_node:
  ros__parameters:
    # トピック名
    cmd_vel_topic: "/turtle1/cmd_vel"
    
    # デフォルト速度
    linear_speed: 1.0
    angular_speed: 1.0
